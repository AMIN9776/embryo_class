# Embryo visual pretraining v2 — DINOv2-large, partial fine-tuning, CLAHE

data_root:    "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2"
images_root:  "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"
output_dir:   "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations"
padded_reference_subdir: "padded_reference_csvs"

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"
val_ratio: 0.15
seed: 42

# ── Preprocessing ─────────────────────────────────────────────────────────────
# Options: "none" / "minmax" / "clahe" / "minmax+clahe"
preprocessing: "minmax+clahe"
clahe_clip: 2.0
clahe_tile: 8

# ── Backbone ──────────────────────────────────────────────────────────────────
# Options: "dinov2-small" (384-d) / "dinov2-base" (768-d) / "dinov2-large" (1024-d)
backbone: "dinov2-large"

# Unfreeze last N transformer blocks for fine-tuning (0 = fully frozen)
unfreeze_last_n_blocks: 4

# Output embedding dim. null = no compression (= backbone feat_dim = 1024 for large)
# Set to e.g. 512 to add a projection bottleneck.
embed_dim: null

# Concatenate CLS token with mean-pooled patch tokens (doubles dim to 2048 for large)
use_patches: false

# ── Data sampling ─────────────────────────────────────────────────────────────
max_per_stage: 5000
max_per_stage_train: 5000
max_per_stage_val: 500
frames_per_stage: 10

# ── Training ──────────────────────────────────────────────────────────────────
batch_size: 32
num_workers: 4

learning_rate: 0.0001
weight_decay: 0.001
num_epochs: 300
warmup_epochs: 10
min_lr: 1.0e-06
early_stop_patience: 30

dropout: 0.3
augmentation: true

focal_gamma: 2.0

class_weight_min: 0.5
class_weight_max: 4.0

# ── Loss weights ──────────────────────────────────────────────────────────────
ce_weight: 1.0
supcon_weight: 0.8
recon_weight: 0.1

# ── LR scheduler ─────────────────────────────────────────────────────────────
lr_scheduler:
  type: "cosine"
  warmup_epochs: 10
  min_lr: 1.0e-06

# ── Logging ───────────────────────────────────────────────────────────────────
metrics_log_freq: 10

# ── Output ───────────────────────────────────────────────────────────────────
result_dir_visual: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain_v3"
