# Embryo visual pretraining config (Phase A) — improved run

data_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2"
images_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"
output_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations"
padded_reference_subdir: "padded_reference_csvs"

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"
val_ratio: 0.15
seed: 42

# More samples per stage — previous run capped at 2000, push to full dataset
max_per_stage: 5000
max_per_stage_train: 5000   # was 2000 — use all available frames
max_per_stage_val: 500
frames_per_stage: 10        # was 5 — sample more frames per interval

batch_size: 64              # was 32 — larger batches improve SupCon quality
num_workers: 4

# Optimization
learning_rate: 0.0002       # slightly lower than before
weight_decay: 0.001
num_epochs: 300
warmup_epochs: 10           # was 5
min_lr: 1.0e-06
early_stop_patience: 30     # was 20 — give more time to converge

focal_gamma: 2.0

# Wider class weight range — t5/t6/t7 need more signal
class_weight_min: 0.5       # was 0.7
class_weight_max: 4.0       # was 3.0

lr_scheduler:
  type: "cosine"
  warmup_epochs: 10
  min_lr: 1.0e-06
  step_size: 50
  gamma: 0.5

# Loss weights — increase supcon, keep recon low
ce_weight: 1.0
supcon_weight: 0.8          # was 0.5 — stronger contrastive signal
recon_weight: 0.1

result_dir_visual: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain_v2"

metrics_log_freq: 10

# Strong augmentation — critical for t5/t6/t7 which are visually ambiguous
dropout: 0.3
augmentation: true