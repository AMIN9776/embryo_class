# Embryo visual pretraining config (Phase A)

# Reuse data layout from preparing_data_config
data_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2"
images_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"
output_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations"
padded_reference_subdir: "padded_reference_csvs"

# Same stage ordering as DiffAct (tHB will be excluded inside the script)
stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

# Splits (use same helper as DiffAct)
val_ratio: 0.15
seed: 42
splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"

# Dataset sampling
# Global per-stage cap (used as default if train/val-specific caps are not set)
max_per_stage: 500           # cap frames per stage overall
# Optional separate caps for train/val; if null, fall back to max_per_stage
max_per_stage_train: 2000
max_per_stage_val: 500
frames_per_stage: 5          # how many frames to sample per interval in *_phases.csv
batch_size: 32
num_workers: 4

# Optimization
learning_rate: 0.0003
weight_decay: 0.001      # stronger regularization
num_epochs: 200
warmup_epochs: 5
min_lr: 1.0e-05
early_stop_patience: 20
focal_gamma: 2.0

# Optional clamping for class weights (after normalization)
class_weight_min: 0.7   # set to null to disable lower bound
class_weight_max: 3.0   # set to null to disable upper bound

# LR scheduler for visual pretrain
# type: "cosine" (warmup + cosine), "step", or "none"
lr_scheduler:
  type: "cosine"
  # cosine-specific
  warmup_epochs: 5
  min_lr: 1.0e-05
  # step-specific (used if type == "step")
  step_size: 50
  gamma: 0.5

# Loss weights (start with CE only; enable others for ablations)
ce_weight: 1.0
supcon_weight: 0.5
recon_weight: 0.1

# Where to save visual pretrain results and best checkpoint
result_dir_visual: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain"

# How often (in epochs) to print per-class precision/recall/F1
metrics_log_freq: 10

# Model / data augmentation
dropout: 0.3          # dropout before classifier / projection
augmentation: true    # random crop/flip/brightness during training

