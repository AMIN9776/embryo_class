# Embryo Phase2: time + visual features (custom encoder v2)

# Data
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"
stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

# External image root (used if precomputed features are missing for a patient)
images_root: "/home/nabizadz/Projects/Nabizadeh/GomezData/embryo_dataset_F0"

# Visual encoder
visual_encoder_type: "custom"

# FEMI precomputed dir — not used when visual_encoder_type is "custom", left blank
precomputed_femi_dir:

# Custom encoder — v2 checkpoint and precomputed features
custom_encoder_checkpoint: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain_v2/best_visual_encoder.pt"
precomputed_custom_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_v2/custom_precomputed_fixed"

# Splits
val_ratio: 0.15
seed: 42
splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"

# Class weights
use_class_weights: "inverse"
class_weight_min: 0.85
class_weight_max: 1.5
exclude_tHB_from_eval: true
num_ddim_seeds: 3

# Modality dropout: randomly zero visual features during training to force sequence reasoning
# Set to 0.0 to disable (current behaviour), recommended range 0.2–0.3 when enabled
modality_dropout_p: 0.25

# Time encoder
time_encoder_output_dim: 64
# Must be "false" for custom encoder — FiLM was trained with absolute hours
time_normalization: "false"

# Visual / fusion
femi_model_name: "ihlab/FEMI"
femi_freeze: true
visual_feature_dim: 128    # 128 for custom encoder
fusion_dim: 128            # output dim of fusion conv (time 64 + visual 128 -> 128)

# Decoder — increased capacity vs previous run
decoder_params:
  num_layers: 6
  num_f_maps: 64         # was 32 — doubled to use richer fused features
  time_emb_dim: 128
  kernel_size: 3
  dropout_rate: 0.1      # was 0.1 — more regularization to counter overfitting

# Diffusion
diffusion_params:
  timesteps: 100
  sampling_timesteps: 25
  ddim_sampling_eta: 1.0
  snr_scale: 0.5

# Training
batch_size: 1
learning_rate: 0.0002
weight_decay: 1.0e-6
num_epochs: 600
log_freq: 5
loss_weights:
  decoder_ce_loss: 1.0
  decoder_mse_loss: 0.1

# Loss config — ordinal loss disabled, lighter focal gamma
loss_config:
  ce_type: "original"
  focal_gamma: 1.0
  ordinal_loss_weight: 0.0        # disabled — was causing t4/t2 collapse in previous run
  monotonicity_loss_weight: 0.25   # penalise backward stage transitions; recommended 0.2–0.5 when enabled

# LR scheduler — faster decay to reduce overfitting
lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 200             # was 400 — single decay over first 200 epochs
  eta_min: 1.0e-5        # was 1e-6 — higher floor keeps learning signal alive

# Output
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_v4"
naming: "phase2_custom_v4"