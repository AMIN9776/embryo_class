# Embryo Phase2: time + visual features (FEMI or custom encoder)

# Data (same padded CSVs as Phase 1)
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"
stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

# External image root (FEMI input)
images_root: "/home/nabizadz/Projects/Nabizadeh/GomezData/embryo_dataset_F0"

# Visual encoder: "femi" (default) or "custom" (pretrained from embryo_visual_pretrain)
visual_encoder_type: "custom"

# Precomputed FEMI features (optional; used when visual_encoder_type: "femi").
# Run: python embryo_phase2/precompute_femi.py --config embryo_phase2/config_embryo_phase2.yaml --device 0
precomputed_femi_dir: /home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_without_class_weights_ordinal_loss_dropout_0.3/custom_precomputed  # e.g. "/path/to/result_embryo_phase2/femi_precomputed"
# precomputed_femi_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2/femi_precomputed"

# Custom encoder (used when visual_encoder_type: "custom"): checkpoint and optional precomputed features
custom_encoder_checkpoint: /home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain/best_visual_encoder.pt  # e.g. "result_visual_pretrain/best_visual_encoder.pt"
precomputed_custom_dir: /home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2/custom_precomputed      # if set, training loads *_custom.pt; run precompute_custom_visual.py first

# Splits (same JSON files as Phase 1)
val_ratio: 0.15
seed: 42
splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"

# Class weights (same scheme as Phase 1)
use_class_weights: "inverse"
class_weight_min: 1
class_weight_max: 1
exclude_tHB_from_eval: true
num_ddim_seeds: 3

# Time encoder
time_encoder_output_dim: 64
# Time normalization mode: "global" (all patients), "per_patient" (each patient 0-1), or "false" (no normalization)
time_normalization: "false"

# Visual / fusion encoder
# When visual_encoder_type: "femi" — use femi_model_name, femi_freeze; visual_feature_dim typically 512
# When visual_encoder_type: "custom" — use custom_encoder_checkpoint; visual_feature_dim typically 128
femi_model_name: "ihlab/FEMI"
femi_freeze: true          # keep FEMI frozen when using FEMI
visual_feature_dim: 128    # 512 for FEMI, 128 for custom (or add projection in model)
fusion_dim: 128            # fused time+visual dim (input_dim_cross for decoder)

# Decoder / diffusion (same as Phase 1 except timesteps can differ)
decoder_params:
  num_layers: 6
  num_f_maps: 32
  time_emb_dim: 128
  kernel_size: 5
  dropout_rate: 0.1
diffusion_params:
  timesteps: 100
  sampling_timesteps: 25
  ddim_sampling_eta: 1.0
  snr_scale: 0.5

# Training
batch_size: 1
learning_rate: 0.0005
weight_decay: 1.0e-6
num_epochs: 1000
log_freq: 5
loss_weights:
  decoder_ce_loss: 1.0
  decoder_mse_loss: 0.1

# Loss configuration (defaults reproduce original setting)
loss_config:
  ce_type: "focal"        # "original" or "focal"
  focal_gamma: 2.0
  ordinal_loss_weight: 0.2   # >0 to add ordinal loss on stage index

# lr_scheduler:
#   type: "ReduceLROnPlateau"
#   mode: "min"
#   factor: 0.5
#   patience: 10
#   min_lr: 1.0e-6
lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 400        # usually = num_epochs
  eta_min: 1.0e-6   # minimum LR at the end of the cosine

# Output
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_without_class_weights_ordinal_loss_dropout_0.3"
naming: "phase2_time_plus_femi"

