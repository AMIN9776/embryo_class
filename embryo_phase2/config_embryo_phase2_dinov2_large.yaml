# Embryo Phase2: DINOv2-large + CLAHE + CLS+patches (2048-d)
#
# Upgrades visual features vs config_embryo_phase2_dinov2.yaml (768-d base CLS):
#   - DINOv2-large backbone (1024-d CLS)
#   - CLS + mean-pooled patch tokens → 2048-d
#   - Per-image minmax stretch + CLAHE preprocessing
#
# Features precomputed by:
#   python embryo_transformer/precompute_dinov2_v2.py \
#       --config embryo_transformer/config_v3.yaml \
#       --output_dir result_embryo_transformer/dinov2_large_clahe_patches \
#       --model dinov2-large --use_patches --device 0
#
# Architecture changes vs 768-d config:
#   visual_feature_dim  768  → 2048  (full DINOv2-large CLS+patches)
#   fusion_dim          256  → 512   (larger FiLM output for richer features)
#   decoder num_f_maps  128  → 256   (wider decoder)
#
# Class weights: no weights (matching best transformer v4/v6 setting)

# ── Data ────────────────────────────────────────────────────
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

images_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"

# ── Visual encoder ───────────────────────────────────────────
visual_encoder_type: "custom"

# Not used during training (precomputed_custom_dir is set), but kept as fallback
custom_encoder_checkpoint: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain_v2/best_visual_encoder.pt"

# 2048-d DINOv2-large CLS+patches features (precompute_dinov2_v2.py)
precomputed_custom_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_transformer/dinov2_large_clahe_patches"

# FEMI not used
precomputed_femi_dir:

# ── Splits ───────────────────────────────────────────────────
val_ratio: 0.15
seed: 42
splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"

# ── Class weights / eval ─────────────────────────────────────
use_class_weights: null       # no weights (best result in transformer experiments)
class_weight_min: 0.85
class_weight_max: 1.5
exclude_tHB_from_eval: true
num_ddim_seeds: 3

# ── Modality dropout ─────────────────────────────────────────
modality_dropout_p: 0.25

# ── Time encoder ─────────────────────────────────────────────
time_encoder_output_dim: 64
time_normalization: "false"

# ── Visual / fusion ──────────────────────────────────────────
femi_model_name: "ihlab/FEMI"
femi_freeze: true
visual_feature_dim: 2048      # ↑ DINOv2-large CLS+patches (was 768)
fusion_dim: 512               # ↑ larger FiLM output (was 256)

# ── Decoder ──────────────────────────────────────────────────
decoder_params:
  num_layers: 6
  num_f_maps: 256             # ↑ wider to exploit 2048-d features (was 128)
  time_emb_dim: 128
  kernel_size: 3
  dropout_rate: 0.1

# ── Diffusion ────────────────────────────────────────────────
diffusion_params:
  timesteps: 200
  sampling_timesteps: 25
  ddim_sampling_eta: 1.0
  snr_scale: 0.5

# ── Training ─────────────────────────────────────────────────
batch_size: 1
learning_rate: 0.0002
weight_decay: 1.0e-6
num_epochs: 600
log_freq: 5

loss_weights:
  decoder_ce_loss: 1.0
  decoder_mse_loss: 0.1

loss_config:
  ce_type: "original"
  focal_gamma: 1.0
  ordinal_loss_weight: 0.0
  monotonicity_loss_weight: 0.0

lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 200
  eta_min: 1.0e-5

# ── Output ───────────────────────────────────────────────────
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_dinov2"
naming: "phase2_dinov2_large"
