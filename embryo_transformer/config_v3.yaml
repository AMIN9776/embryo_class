# ============================================================
# Embryo Transformer v3: 768-d DINOv2 features (no compression)
# ============================================================
# v2 used 128-d Phase A embeddings (DINOv2 768-d → 128-d bottleneck).
# v3 uses raw 768-d DINOv2 CLS tokens — no projection loss, the
# Transformer input projection (768 → d_model) learns its own reduction.
# Changes vs v2:
#   visual_input_dim  128  → 768   (full DINOv2 CLS token)
#   precomputed_custom_dir         → dinov2_precomputed/
#   d_model           256  → 512   (larger model to exploit richer input)
#   n_heads             8  → 8
#   d_ff              512  → 1024
#   n_layers            6  → 6
#   dropout           0.2  → 0.3   (higher input dim needs more regularisation)
#   T_max             250  → 300   (match num_epochs)

# ── Data ────────────────────────────────────────────────────
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"
images_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"

# Precomputed 768-dim DINOv2 CLS features (shape per file: 768 × T)
precomputed_custom_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_transformer/dinov2_precomputed"

splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"
val_ratio: 0.15
seed: 42

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

exclude_tHB_from_eval: true

# ── Model ────────────────────────────────────────────────────
visual_input_dim: 768     # ↑ full DINOv2 CLS token (was 128)
d_model: 512              # ↑ larger model to exploit richer features (was 256)
n_heads: 8                # attention heads (d_model must be divisible by n_heads)
n_layers: 6               # transformer encoder layers
d_ff: 1024                # ↑ feedforward dim (was 512)
dropout: 0.3              # ↑ higher dim → more regularisation needed (was 0.2)
max_time_hours: 160.0     # used to normalise sinusoidal time embedding

# ── Masked Stage Prediction (MSP) ────────────────────────────
use_msp: true
msp_mask_prob: 0.25
msp_bert_schedule: true   # 80% mask-token, 10% random feat, 10% keep-as-is

# ── Monotonic decoding (inference only) ──────────────────────
use_monotonic_decoding: false

# ── Class weights ─────────────────────────────────────────────
use_class_weights: "inverse"
class_weight_min: 0.5
class_weight_max: 3.0

# ── Loss ──────────────────────────────────────────────────────
ce_weight: 1.0
msp_weight: 1.0
monotonicity_weight: 0.3
smoothness_weight: 0.05

focal_gamma: 1.0
label_smoothing: 0.1

# ── Training ──────────────────────────────────────────────────
batch_size: 4
learning_rate: 0.0001
weight_decay: 1.0e-4
num_epochs: 300
warmup_epochs: 10
log_freq: 5

lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 300              # ↑ matches num_epochs
  eta_min: 1.0e-6

# ── Output ────────────────────────────────────────────────────
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_transformer"
naming: "transformer_v3"
