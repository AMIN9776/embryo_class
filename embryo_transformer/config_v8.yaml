# ============================================================
# Embryo Transformer v8: v7 with faster LR decay + early stopping
# ============================================================
# v7 (fine-tuned DINOv2-large 1024-d, no weights): macro F1=67.89
#   → best model was epoch 20 out of 300
#   → LR still ~9.9e-5 at epoch 20 (T_max=300 too long)
#   → 280 epochs wasted after peak
#
# v8 fixes:
#   T_max: 300 → 100   faster cosine decay, LR drops to min by epoch 100
#   early_stop_patience: 30 evals (× log_freq=5 → 150 epochs max without improvement)
#   num_epochs: 300 → 300  (kept high; early stopping will terminate earlier)
#
# Everything else identical to v7.

# ── Data ────────────────────────────────────────────────────
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"
images_root: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/embryo_dataset_F0"

precomputed_custom_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_visual_pretrain_v3/extracted"

splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"
val_ratio: 0.15
seed: 42

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

exclude_tHB_from_eval: true

# ── Model ────────────────────────────────────────────────────
visual_input_dim: 1024
d_model: 512
n_heads: 8
n_layers: 6
d_ff: 1024
dropout: 0.3
max_time_hours: 160.0

# ── Masked Stage Prediction (MSP) ────────────────────────────
use_msp: true
msp_mask_prob: 0.25
msp_bert_schedule: true

# ── Monotonic decoding (inference only) ──────────────────────
use_monotonic_decoding: false

# ── Class weights ─────────────────────────────────────────────
use_class_weights: null
class_weight_min: 0.5
class_weight_max: 3.0

# ── Loss ─────────────────────────────────────────────────────
ce_weight: 1.0
msp_weight: 1.0
monotonicity_weight: 0.3
smoothness_weight: 0.05

focal_gamma: 1.0
label_smoothing: 0.1

# ── Training ─────────────────────────────────────────────────
batch_size: 4
learning_rate: 0.0001
weight_decay: 1.0e-4
num_epochs: 300
warmup_epochs: 10
log_freq: 5

early_stop_patience: 30   # stop if no improvement for 30 consecutive val evals

lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 100              # ↓ from 300 — LR decays to min by epoch 100
  eta_min: 1.0e-6

# ── Output ───────────────────────────────────────────────────
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_transformer"
naming: "transformer_v8"
