# ============================================================
# Embryo Transformer (Phase 3): BERT-style Transformer Encoder
# ============================================================
# Replaces diffusion with bidirectional self-attention so the
# model can fill in short stages (t3, t5, t6, t7) from both
# past AND future context in the same sequence.

# ── Data ────────────────────────────────────────────────────
padded_csv_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/Data_outputs_visualizations/padded_reference_csvs"

# Precomputed 128-dim custom features (shape per file: 128 × 743)
precomputed_custom_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_v2/custom_precomputed"

splits_dir: "/home/nabizadz/Projects/Amin/Embryo/Embryo_data_cropped_applied_on_all_v2/splits"
val_ratio: 0.15
seed: 42

stage_names:
  - tPB2
  - tPNa
  - tPNf
  - t2
  - t3
  - t4
  - t5
  - t6
  - t7
  - t8
  - t9+
  - tM
  - tSB
  - tB
  - tEB
  - tHB

exclude_tHB_from_eval: true

# ── Model ────────────────────────────────────────────────────
visual_input_dim: 128     # dim of precomputed custom features
d_model: 256              # transformer hidden dim
n_heads: 8                # attention heads (d_model must be divisible by n_heads)
n_layers: 6               # transformer encoder layers
d_ff: 512                 # feedforward dim inside each layer
dropout: 0.1
max_time_hours: 160.0     # used to normalise sinusoidal time embedding

# ── Masked Stage Prediction (MSP) ────────────────────────────
# Like BERT MLM: randomly mask valid frames so model must
# predict stage from bilateral temporal context.
use_msp: true
msp_mask_prob: 0.20       # fraction of valid frames masked per sample
msp_bert_schedule: true   # 80% mask-token, 10% random feat, 10% keep-as-is

# ── Monotonic decoding (inference only) ──────────────────────
# Viterbi pass that enforces non-decreasing stage sequence.
# Has no effect on training; purely post-processing.
use_monotonic_decoding: false

# ── Class weights ─────────────────────────────────────────────
use_class_weights: "inverse"
class_weight_min: 0.5     # wider range than phase2: short stages need more signal
class_weight_max: 3.0

# ── Loss ──────────────────────────────────────────────────────
ce_weight: 1.0            # CE on ALL valid frames (primary task)
msp_weight: 1.0           # extra weight on MSP-masked frames (on top of ce_weight)
monotonicity_weight: 0.3  # penalise backward expected-stage-index transitions
smoothness_weight: 0.05   # log-softmax MSE between adjacent valid frames

focal_gamma: 1.0          # 0.0 = standard CE, 2.0 = strong focal

# ── Training ──────────────────────────────────────────────────
batch_size: 4             # patients per batch (T=743 fixed; reduceable if OOM)
learning_rate: 0.0001
weight_decay: 1.0e-5
num_epochs: 300
warmup_epochs: 10         # linear LR warmup
log_freq: 5               # eval every N epochs

lr_scheduler:
  type: "CosineAnnealingLR"
  T_max: 200
  eta_min: 1.0e-6

# ── Output ────────────────────────────────────────────────────
result_dir: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_transformer"
naming: "transformer_v1"
