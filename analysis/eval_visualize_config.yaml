# ── Model ─────────────────────────────────────────────────────────────────────
model_type: "diffusion"          # "transformer" or "diffusion"
model_config: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/embryo_phase2/config_embryo_phase2_finetuned.yaml"
checkpoint: "/home/nabizadz/Projects/Amin/Embryo/ASDiffusion_v2/DiffAct/result_embryo_phase2_dinov2/phase2_finetuned/best_model.pt"             # null → auto (result_dir/naming/best_model.pt)
device: 0

# Transformer options
monotonic_decoding: true           # apply Viterbi monotonic decoding (transformer only)

# Diffusion options
num_ddim_seeds: 3                  # DDIM seeds to average (diffusion only)

# ── Evaluation / patient selection ────────────────────────────────────────────
